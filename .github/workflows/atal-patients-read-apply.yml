name: apply-atal-patients-read

on:
  push:
    branches:
      - feature/atal-ai-linear-agent
    paths:
      - scripts/atal-ai/add-patients-read-resource.mjs
      - .github/workflows/atal-patients-read-apply.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-linear-agent
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/atal-ai/add-patients-read-resource.mjs
      - name: Commit canonical patient read
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/core/tools/universalReadTools.ts src/features/atal-ai/api/agentToolCatalog.ts tests/atal-ai-tool-contracts.test.mjs tests/atal-ai-live-smoke.mjs
          git commit -m "feat: let Atal IA list and count patients canonically"
          git push origin HEAD:feature/atal-ai-linear-agent
