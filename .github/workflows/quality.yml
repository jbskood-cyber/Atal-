name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: python scripts/atal-ai/apply-isolation-repair.py
      - run: npm ci
      - run: npm run quality
      - name: Commit validated repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve global and contextual assistant boundaries"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
