name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run quality with concise diagnostics
        shell: bash
        run: |
          set +e
          npm run quality > /tmp/atal-quality.log 2>&1
          status=$?
          tail -n 120 /tmp/atal-quality.log
          exit "$status"
