name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply validated assistant isolation repair
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/features/atal-ai/AtalAIGeneralScreen.tsx')
          text = path.read_text()

          old = """  useEffect(() => {
            if (draft) saveAIDraft(draft);
          }, [draft]);

          useEffect(() => {
            endRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
          }, [conversation.messages.length, conversation.status, draft?.updatedAt]);
"""
          new = """  useEffect(() => {
            if (draft) saveAIDraft(draft);
          }, [draft]);

          useEffect(() => {
            if (conversation.agentTask?.status === 'needs-confirmation') setDialog('agent-confirmation');
          }, [conversation.id, conversation.agentTask?.status]);

          useEffect(() => {
            endRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
          }, [conversation.messages.length, conversation.status, draft?.updatedAt]);
"""
          if old not in text:
              raise SystemExit('pending-confirmation insertion anchor not found')
          text = text.replace(old, new, 1)

          old = """      patchConversation({ savedResult: { ...conversation.savedResult, summary: conversation.savedResult?.summary ?? [], undo: undefined } });
              append(createMessage('assistant', 'Cambio deshecho correctamente.'));
"""
          new = """      patchConversation({ savedResult: { ...conversation.savedResult, summary: conversation.savedResult?.summary ?? [], undo: undefined } });
              setNotice('Último cambio deshecho.');
              append(createMessage('assistant', 'Cambio deshecho correctamente.'));
"""
          if old not in text:
              raise SystemExit('undo anchor not found')
          text = text.replace(old, new, 1)

          anchor = """  const matchingPatient = !collisionDismissed && draft?.patient.name.trim() && conversation.workContext.patientMode === 'new'
"""
          insert = """  const cancelDialog = () => {
            if (dialog === 'agent-confirmation' && conversation.agentTask?.status === 'needs-confirmation') {
              const task = {
                ...conversation.agentTask,
                status: 'cancelled' as const,
                pendingInvocation: undefined,
                pendingCall: undefined,
                finalText: 'Acción cancelada. Los pasos ya completados se conservaron.',
                updatedAt: new Date().toISOString(),
              };
              setConversation((current) => {
                const next = {
                  ...current,
                  agentTask: task,
                  status: statusAfterConversation(draft),
                  messages: [...current.messages, createMessage('assistant', task.finalText)],
                  updatedAt: new Date().toISOString(),
                };
                saveAIConversation(next);
                return next;
              });
            }
            setDialog(null);
            setLegacyConfirmation(null);
          };

          const matchingPatient = !collisionDismissed && draft?.patient.name.trim() && conversation.workContext.patientMode === 'new'
"""
          if anchor not in text:
              raise SystemExit('cancel dialog anchor not found')
          text = text.replace(anchor, insert, 1)

          old = """      {!conversation.messages.length && <article className=\"atal-command-intro\"><AtalMark /><div><b>Atal IA</b><p>Pregunta cualquier cosa sobre Atal o prepara un cambio revisable.</p></div></article>}
"""
          new = """      {!conversation.messages.length && <article className=\"atal-command-intro\"><AtalMark /><div><b>Atal IA</b><h1>¿Qué necesitas resolver?</h1><p>Pregunta cualquier cosa sobre Atal o prepara un cambio revisable.</p></div></article>}
"""
          if old not in text:
              raise SystemExit('intro anchor not found')
          text = text.replace(old, new, 1)

          old = """{conversation.savedResult.undo && <button type=\"button\" className=\"atal-command-undo\" onClick={undo}>Deshacer cambio</button>}"""
          new = """{conversation.savedResult.undo && <button type=\"button\" className=\"atal-command-undo\" aria-label=\"Deshacer último cambio\" onClick={undo}>Deshacer cambio</button>}"""
          if old not in text:
              raise SystemExit('undo button anchor not found')
          text = text.replace(old, new, 1)

          old = """      agentText={conversation.agentTask?.finalText}
              onCancel={() => {
                setDialog(null);
                setLegacyConfirmation(null);
              }}
"""
          new = """      agentText={conversation.agentTask?.finalText}
              agentLabel={conversation.agentTask?.pendingInvocation?.authorization === 'file-derived' ? 'Revisa antes de guardar' : 'Confirmación necesaria'}
              onCancel={cancelDialog}
"""
          if old not in text:
              raise SystemExit('confirm invocation anchor not found')
          text = text.replace(old, new, 1)

          old = """function ConfirmDialog({ kind, draft, agentText, onCancel, onConfirm }: { kind: 'discard' | 'restart' | 'legacy-confirmation' | 'agent-confirmation'; draft: AtalAIDraft | null; agentText?: string; onCancel: () => void; onConfirm: () => void }) {"""
          new = """function ConfirmDialog({ kind, draft, agentText, agentLabel, onCancel, onConfirm }: { kind: 'discard' | 'restart' | 'legacy-confirmation' | 'agent-confirmation'; draft: AtalAIDraft | null; agentText?: string; agentLabel?: string; onCancel: () => void; onConfirm: () => void }) {"""
          if old not in text:
              raise SystemExit('confirm signature anchor not found')
          text = text.replace(old, new, 1)
          text = text.replace(
              "? ['¿Continuar con la acción sensible?', agentText || 'Atal IA completó los pasos seguros y necesita autorización para continuar.', 'Confirmar y continuar']",
              "? ['¿Continuar con la acción sensible?', agentText || 'Atal IA completó los pasos seguros y necesita autorización para continuar.', 'Continuar']",
              1,
          )

          old = """  return <div className=\"atal-command-dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"atal-confirm-title\" onMouseDown={onCancel}><section className=\"atal-confirm-sheet\" onMouseDown={(event) => event.stopPropagation()}><AlertTriangle /><h2 id=\"atal-confirm-title\">{copy[0]}</h2><p>{copy[1]}</p><button type=\"button\" className=\"is-primary\" onClick={onConfirm}>{copy[2]}</button><button ref={cancelRef} type=\"button\" onClick={onCancel}>Cancelar</button></section></div>;
"""
          new = """  return <div className=\"atal-command-dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"atal-confirm-title\" onMouseDown={onCancel}><section className=\"atal-confirm-sheet\" onMouseDown={(event) => event.stopPropagation()}><AlertTriangle />{kind === 'agent-confirmation' && <small>{agentLabel || 'Confirmación necesaria'}</small>}<h2 id=\"atal-confirm-title\">{copy[0]}</h2><p>{copy[1]}</p><button type=\"button\" className=\"is-primary\" onClick={onConfirm}>{copy[2]}</button><button ref={cancelRef} type=\"button\" onClick={onCancel}>Cancelar</button></section></div>;
"""
          if old not in text:
              raise SystemExit('confirm render anchor not found')
          text = text.replace(old, new, 1)
          path.write_text(text)

          critical = Path('e2e/block-4-1-critical.spec.mjs')
          critical_text = critical.read_text().replace(
              "await sendMessage(page, 'Crea a José QA con un plan.');",
              "await sendMessage(page, 'Registra al paciente José QA con un plan.');",
              1,
          )
          critical.write_text(critical_text)

          regression = Path('e2e/block-4-3-conversation-regressions.spec.mjs')
          regression_text = regression.read_text().replace(
              "const contextual = conversations.find((item) => item.id === contextualId);",
              "expect(contextualId).toBeTruthy();\n    const contextual = conversations.find((item) => item.scope === 'contextual' && item.contextKey);",
              1,
          ).replace(
              "expect(contextual.scope).toBe('contextual');",
              "expect(contextual).toBeTruthy();\n    expect(contextual.scope).toBe('contextual');",
              1,
          )
          regression.write_text(regression_text)

          repair = Path('.github/workflows/atal-ai-isolation-repair.yml')
          if repair.exists(): repair.unlink()

          Path('.github/workflows/quality.yml').write_text("""name: quality

          on:
            pull_request:
            push:
              branches: [main]

          permissions:
            contents: read

          jobs:
            quality:
              runs-on: ubuntu-latest
              timeout-minutes: 15
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 24
                    cache: npm
                - run: npm ci
                - run: npm run quality
                - name: Verify generated capability matrix
                  run: |
                    npm run audit:ai-capabilities
                    git diff --exit-code -- docs/atal-ai/block-4-3/03-capability-parity-matrix.md
                - name: Live Gemini function-calling smoke
                  run: npm run test:ai-live
                  env:
                    GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                    GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          """.replace('          ', ''))
          PY
      - run: npm ci
      - run: npm run quality
      - name: Commit validated repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/AtalAIGeneralScreen.tsx e2e/block-4-1-critical.spec.mjs e2e/block-4-3-conversation-regressions.spec.mjs .github/workflows/quality.yml .github/workflows/atal-ai-isolation-repair.yml
          git commit -m "fix: preserve global and contextual assistant boundaries"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
