name: apply-block-4-3-codemod

on:
  push:
    branches:
      - feature/atal-ai-agentic-audit-block-4-3
    paths:
      - 'scripts/atal-ai/apply-block-4-3-core-codemod.mjs'
      - '.github/workflows/apply-block-4-3-codemod.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/atal-ai/apply-block-4-3-core-codemod.mjs
      - name: Commit core changes
        run: |
          if git diff --quiet; then
            echo "Core codemod already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/core/contracts.ts src/features/atal-ai/core/transactionEngine.ts src/features/atal-ai/core/undoEngine.ts src/features/atal-ai/core/riskPolicy.ts
          git commit -m "feat: authorize explicit reversible agent actions"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
