name: e2e

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install application dependencies
        run: npm ci
      - name: Install Playwright test runner without changing the lockfile
        run: npm install --no-save --no-package-lock @playwright/test@1.61.1
      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium
      - name: Run critical Block 4.1 E2E suite
        run: npx playwright test
      - name: Upload Playwright evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-evidence
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
