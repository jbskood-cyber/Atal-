name: atal-e2e-comment-diagnostic

on:
  push:
    branches:
      - feature/atal-ai-linear-agent
    paths:
      - .github/workflows/atal-e2e-comment-diagnostic.yml

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/atal-ai-linear-agent
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm install --no-save --no-package-lock @playwright/test@1.61.1
      - run: npx playwright install --with-deps chromium
      - name: Run focused E2E and capture output
        shell: bash
        run: |
          set +e
          npx playwright test e2e/block-4-3-conversation-regressions.spec.mjs --reporter=line > /tmp/atal-e2e.txt 2>&1
          status=$?
          {
            echo '## Temporary Atal agent E2E diagnostic'
            echo
            echo "Exit status: $status"
            echo
            echo '```text'
            tail -n 240 /tmp/atal-e2e.txt
            echo '```'
          } > /tmp/atal-comment.md
          exit 0
      - name: Publish diagnostic to PR 19
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 19 --repo jbskood-cyber/Atal- --body-file /tmp/atal-comment.md
