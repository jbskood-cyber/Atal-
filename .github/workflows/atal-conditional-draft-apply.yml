name: apply-conditional-atal-draft

on:
  push:
    branches:
      - feature/atal-ai-linear-agent
    paths:
      - scripts/atal-ai/apply-conditional-draft.mjs
      - .github/workflows/atal-conditional-draft-apply.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-linear-agent
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/atal-ai/apply-conditional-draft.mjs
      - name: Commit conditional draft integration
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/AtalAIGeneralScreen.tsx
          git commit -m "feat: show Atal draft only when review is needed"
          git push origin HEAD:feature/atal-ai-linear-agent
