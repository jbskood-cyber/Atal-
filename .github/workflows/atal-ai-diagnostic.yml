name: atal-ai-diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  publish-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - name: Apply validated type fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/features/atal-ai/AtalAIGeneralScreen.tsx')
          text = path.read_text()
          text = text.replace(
              "planId: data.planId ?? draft.command?.planId ?? conversation.workContext.selectedPlanId || undefined,",
              "planId: (data.planId ?? draft.command?.planId ?? conversation.workContext.selectedPlanId) || undefined,",
          )
          text = text.replace(
              "patientId: data.patientId ?? draft.command?.patientId ?? conversation.workContext.selectedPatientId || undefined,",
              "patientId: (data.patientId ?? draft.command?.patientId ?? conversation.workContext.selectedPatientId) || undefined,",
          )
          text = text.replace(
              "patchConversation({ savedResult: { ...conversation.savedResult, undo: undefined } });",
              "patchConversation({ savedResult: { ...conversation.savedResult, summary: conversation.savedResult?.summary ?? [], undo: undefined } });",
          )
          path.write_text(text)
          Path('.github/workflows/atal-ai-diagnostic.yml').unlink()
          PY
      - name: Commit validated fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/AtalAIGeneralScreen.tsx .github/workflows/atal-ai-diagnostic.yml
          git commit -m "fix: stabilize global assistant integration"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
