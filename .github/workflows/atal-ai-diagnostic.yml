name: atal-ai-diagnostic

on:
  pull_request:
    branches: [main]

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture typecheck diagnostics
        run: npm run typecheck > atal-ai-typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: atal-ai-typecheck-diagnostics
          path: atal-ai-typecheck.log
          if-no-files-found: error
