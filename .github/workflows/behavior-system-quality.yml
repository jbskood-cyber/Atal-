name: behavior-system-quality

on:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behavior-typecheck-log
          path: typecheck.log
          if-no-files-found: error
          retention-days: 1

  core-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Compile core
        shell: bash
        run: |
          set -o pipefail
          npm run test:core:compile 2>&1 | tee core-compile.log
      - name: Upload core compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behavior-core-compile-log
          path: core-compile.log
          if-no-files-found: error
          retention-days: 1

  behavior-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:core:compile
      - run: node --test tests/atal-behavior-system.test.mjs

  legacy-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:core:compile
      - name: Run legacy tests individually
        id: legacy
        shell: bash
        run: |
          set +e
          : > legacy-test-failures.txt
          for file in tests/*.test.mjs; do
            if [ "$file" = "tests/atal-behavior-system.test.mjs" ]; then
              continue
            fi
            echo "=== $file ==="
            node --test "$file"
            code=$?
            if [ $code -ne 0 ]; then
              echo "$file" >> legacy-test-failures.txt
            fi
          done
          if [ -s legacy-test-failures.txt ]; then
            echo "Failing legacy test files:"
            cat legacy-test-failures.txt
            exit 1
          fi
      - name: Upload legacy failure manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-test-failure-manifest
          path: legacy-test-failures.txt
          if-no-files-found: error
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behavior-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 1
