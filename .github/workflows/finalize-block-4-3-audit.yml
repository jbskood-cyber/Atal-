name: finalize-block-4-3-audit

on:
  push:
    branches:
      - feature/atal-ai-agentic-audit-block-4-3
    paths:
      - 'scripts/atal-ai/finalize-block-4-3-audit.mjs'
      - '.github/workflows/finalize-block-4-3-audit.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/atal-ai/finalize-block-4-3-audit.mjs
      - run: npm run audit:ai-capabilities
      - name: Commit audit artifacts
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/core/audit/manualCapabilityInventory.ts docs/atal-ai/block-4-3/03-capability-parity-matrix.md
          git commit -m "docs: finalize Block 4.3 capability matrix"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
