name: add-agent-conversation-state

on:
  push:
    branches:
      - feature/atal-ai-agentic-audit-block-4-3
    paths:
      - 'scripts/atal-ai/add-agent-conversation-state.mjs'
      - '.github/workflows/add-agent-conversation-state.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/atal-ai/add-agent-conversation-state.mjs
      - name: Commit state type
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/types.ts
          git commit -m "feat: persist agent task in conversations"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
