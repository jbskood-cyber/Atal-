name: atal-linear-agent-diagnostic

on:
  push:
    branches:
      - feature/atal-ai-linear-agent

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-linear-agent
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture TypeScript diagnostics
        shell: bash
        run: |
          mkdir -p docs/diagnostics
          set +e
          npm run typecheck > docs/diagnostics/atal-linear-agent-typecheck.txt 2>&1
          status=$?
          echo "EXIT_STATUS=$status" >> docs/diagnostics/atal-linear-agent-typecheck.txt
          exit 0
      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/diagnostics/atal-linear-agent-typecheck.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: capture Atal agent typecheck diagnostics"
          git push origin HEAD:feature/atal-ai-linear-agent
