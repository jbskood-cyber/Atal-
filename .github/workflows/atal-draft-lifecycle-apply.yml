name: apply-atal-draft-lifecycle

on:
  push:
    branches:
      - feature/atal-ai-linear-agent
    paths:
      - scripts/atal-ai/apply-draft-lifecycle.mjs
      - .github/workflows/atal-draft-lifecycle-apply.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-linear-agent
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/atal-ai/apply-draft-lifecycle.mjs
      - name: Commit draft lifecycle integration
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/AtalAIGeneralScreen.tsx src/features/atal-ai/contextual/useContextualConversation.ts
          git commit -m "fix: hide Atal draft after confirmed application"
          git push origin HEAD:feature/atal-ai-linear-agent
