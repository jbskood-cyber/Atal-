name: fix-block-4-3-compile

on:
  push:
    branches:
      - feature/atal-ai-agentic-audit-block-4-3
    paths:
      - 'scripts/atal-ai/fix-block-4-3-compile.mjs'
      - '.github/workflows/fix-block-4-3-compile.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/atal-ai/fix-block-4-3-compile.mjs
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/core/agentic/agentLoop.ts src/features/atal-ai/core/tools/universalPatientTools.ts src/features/atal-ai/core/tools/universalPlanExerciseTools.ts
          git commit -m "fix: resolve Block 4.3 agent compile errors"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
