name: migrate-agentic-e2e

on:
  push:
    branches:
      - feature/atal-ai-agentic-audit-block-4-3
    paths:
      - 'scripts/atal-ai/migrate-agentic-e2e.mjs'
      - '.github/workflows/migrate-agentic-e2e.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/atal-ai/migrate-agentic-e2e.mjs
      - name: Commit migrated tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/block-4-1-critical.spec.mjs e2e/block-4-3-agentic.spec.mjs src/features/atal-ai/core/tools/universalPatientTools.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "test: migrate critical regressions to universal agent"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
