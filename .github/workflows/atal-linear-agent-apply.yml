name: apply-linear-agent-ui

on:
  push:
    branches:
      - feature/atal-ai-linear-agent
    paths:
      - scripts/atal-ai/apply-linear-agent-ui.mjs
      - .github/workflows/atal-linear-agent-apply.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-linear-agent
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply surgical UI integration
        run: node scripts/atal-ai/apply-linear-agent-ui.mjs
      - name: Commit generated integration
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/atal-ai/AtalAIGeneralScreen.tsx
          git commit -m "feat: stream and format Atal agent responses"
          git push origin HEAD:feature/atal-ai-linear-agent
