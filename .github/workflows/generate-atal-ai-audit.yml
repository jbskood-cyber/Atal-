name: generate-atal-ai-audit

on:
  push:
    branches:
      - feature/atal-ai-agentic-audit-block-4-3
    paths:
      - 'src/features/atal-ai/core/audit/**'
      - 'scripts/atal-ai/generate-capability-report.mjs'
      - 'package.json'
      - '.github/workflows/generate-atal-ai-audit.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit:ai-capabilities
      - name: Commit generated matrix
        run: |
          if git diff --quiet -- docs/atal-ai/block-4-3/03-capability-parity-matrix.md; then
            echo "Matrix already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/atal-ai/block-4-3/03-capability-parity-matrix.md
          git commit -m "docs: generate Atal AI capability parity matrix"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
