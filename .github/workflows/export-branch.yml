name: foundation-runner
on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-functional-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply and verify without failing the workflow
        shell: bash
        run: |
          set +e
          mkdir -p docs/functional-qa
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-functional-foundation.mjs')
          source = path.read_text()
          old = "  test: {\n    environment: 'jsdom',"
          new = "  test: {\n    globals: true,\n    environment: 'jsdom',"
          if old not in source:
              raise SystemExit('Vitest config pattern not found')
          path.write_text(source.replace(old, new, 1))
          PY
          node --check scripts/apply-functional-foundation.mjs > docs/functional-qa/foundation-runner.txt 2>&1
          syntax_status=$?
          if [ "$syntax_status" -eq 0 ]; then
            node scripts/apply-functional-foundation.mjs >> docs/functional-qa/foundation-runner.txt 2>&1
            apply_status=$?
          else
            apply_status=1
          fi
          if [ "$apply_status" -eq 0 ]; then
            npm install --no-audit --no-fund >> docs/functional-qa/foundation-runner.txt 2>&1
            install_status=$?
          else
            install_status=1
          fi
          if [ "$install_status" -eq 0 ]; then
            npm run quality >> docs/functional-qa/foundation-runner.txt 2>&1
            quality_status=$?
          else
            quality_status=1
          fi
          printf '\nsyntax=%s\napply=%s\ninstall=%s\nquality=%s\n' "$syntax_status" "$apply_status" "$install_status" "$quality_status" >> docs/functional-qa/foundation-runner.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$quality_status" -eq 0 ]; then
            rm -f scripts/apply-functional-foundation.mjs .github/workflows/foundation-bootstrap.yml .github/workflows/export-branch.yml docs/functional-qa/bootstrap-diagnostic.txt docs/functional-qa/quality-diagnostic.txt docs/functional-qa/foundation-runner.txt
            git add -A
            git diff --cached --check
            git commit -m "fix: establish Atal functional foundation"
          else
            git add docs/functional-qa/foundation-runner.txt
            git commit -m "chore: record foundation runner result" || true
          fi
          git push origin HEAD:feature/atal-functional-foundation
          exit 0
