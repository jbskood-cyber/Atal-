name: atal-e2e-summary-diagnostic

on:
  push:
    branches:
      - feature/atal-ai-linear-agent
    paths:
      - .github/workflows/atal-e2e-summary-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/atal-ai-linear-agent
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm install --no-save --no-package-lock @playwright/test@1.61.1
      - run: npx playwright install --with-deps chromium
      - name: Capture concise focused E2E summary
        shell: bash
        run: |
          mkdir -p docs/diagnostics
          set +e
          npx playwright test e2e/block-4-3-conversation-regressions.spec.mjs --reporter=line > /tmp/atal-e2e-full.txt 2>&1
          status=$?
          {
            echo "EXIT_STATUS=$status"
            echo "=== FAILURES_AND_SUMMARY ==="
            grep -E "(^[[:space:]]*[0-9]+\)|Error:|Timeout|failed|passed|expect\(|at e2e/)" /tmp/atal-e2e-full.txt | tail -n 120 || true
          } > docs/diagnostics/atal-linear-agent-e2e-summary.txt
          exit 0
      - name: Commit concise diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/diagnostics/atal-linear-agent-e2e-summary.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: capture concise Atal agent E2E summary"
          git push origin HEAD:feature/atal-ai-linear-agent
