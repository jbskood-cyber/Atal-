name: block-4-3-diagnostics

on:
  push:
    branches:
      - feature/atal-ai-agentic-audit-block-4-3
    paths:
      - 'src/**'
      - 'server/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/block-4-3-diagnostics.yml'

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/atal-ai-agentic-audit-block-4-3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture complete quality evidence
        shell: bash
        run: |
          mkdir -p docs/atal-ai/block-4-3
          set +e
          npm run typecheck > docs/atal-ai/block-4-3/ci-diagnostic.txt 2>&1
          echo "TYPECHECK_EXIT=$?" >> docs/atal-ai/block-4-3/ci-diagnostic.txt
          npm test >> docs/atal-ai/block-4-3/ci-diagnostic.txt 2>&1
          echo "TEST_EXIT=$?" >> docs/atal-ai/block-4-3/ci-diagnostic.txt
          npm run build >> docs/atal-ai/block-4-3/ci-diagnostic.txt 2>&1
          echo "BUILD_EXIT=$?" >> docs/atal-ai/block-4-3/ci-diagnostic.txt
          node --test tests/atal-ai-agent-loop.test.mjs tests/atal-ai-universal-read-tools.test.mjs tests/atal-ai-universal-actions.test.mjs >> docs/atal-ai/block-4-3/ci-diagnostic.txt 2>&1
          echo "AGENT_FOCUSED_EXIT=$?" >> docs/atal-ai/block-4-3/ci-diagnostic.txt
          exit 0
      - name: Publish diagnostic output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/atal-ai/block-4-3/ci-diagnostic.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "test: publish complete Block 4.3 diagnostic output"
          git push origin HEAD:feature/atal-ai-agentic-audit-block-4-3
